# Reference recipe C — first Hotpants + chain, second Hotpants using saved bkg (FFI − bkg), repeat chain.
# Note: inputs.convolved on the second hotpants is accepted in YAML but not yet used by the runner.

ffi_dir: "data/tess_ffi"
output_dir: "output/run_c"
gaia_catalog: "data/catalogs/gaia.csv"
template_dir: "output/templates"
removed_stars_csv: "output/templates/removed_stars.csv"

target_ra: 210.219333
target_dec: 81.846589
sector: 20
camera: 3
ccd: 3

epsf_temporal_smooth: true
psf_type: "epsf"

pipeline:
  - kind: wcs_grouping
  - kind: shared_mask
  - kind: hotpants
    science: ffi
    output:
      diffs: hp1_d
      convolved: hp1_c
      bkg: hp1_b
  - kind: epsf
    inputs:
      diffs: hp1_d
    output: ep1
  - kind: sat_template
    inputs:
      diffs: hp1_d
      epsf: ep1
    output: sat1
  - kind: subtract
    inputs:
      science: hp1_d
      template: sat1
    output: d1_sat
  - kind: forced_photometry
    inputs:
      diffs: d1_sat
      epsf: ep1
    output: lc1_epsf
  - kind: background_estimate
    inputs:
      diffs: d1_sat
      bkg: hp1_b
    mode: rough_then_adaptive
    output: bkg1
  - kind: subtract
    inputs:
      science: d1_sat
      template: bkg1
    output: d1_fin
  - kind: forced_photometry
    inputs:
      diffs: d1_fin
      epsf: ep1
    output: lc2_epsf

  - kind: hotpants
    science: ffi
    inputs:
      bkg: hp1_b
      convolved: hp1_c
    output:
      diffs: hp2_d
      convolved: hp2_c
      bkg: hp2_b

  - kind: epsf
    inputs:
      diffs: hp2_d
    output: ep2
  - kind: sat_template
    inputs:
      diffs: hp2_d
      epsf: ep2
    output: sat2
  - kind: subtract
    inputs:
      science: hp2_d
      template: sat2
    output: d2_sat
  - kind: forced_photometry
    inputs:
      diffs: d2_sat
      epsf: ep2
    output: lc3_epsf
  - kind: background_estimate
    inputs:
      diffs: d2_sat
      bkg: hp2_b
    mode: rough_then_adaptive
    output: bkg2
  - kind: subtract
    inputs:
      science: d2_sat
      template: bkg2
    output: d2_fin
  - kind: forced_photometry
    inputs:
      diffs: d2_fin
      epsf: ep2
    output: lc4_epsf
