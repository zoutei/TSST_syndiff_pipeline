# Site policy: stages, resource pools, notifications. Paths live in deployment.yaml.
deployment_file: deployment.yaml
#
# See TESTING.md for how to validate without running full multi-hour stages.

stages:
  wcs_grouping:
    offset_threshold: 0.01
    wcs_drift_savgol_window: 11
    wcs_drift_savgol_polyorder: 2
  mapping:
    # pancakes_v2 defaults (run.sh did not pass overrides)
    oversampling_factor: 1
    buffer: 200
    tess_buffer: 150
    skip_download_catalog: false
  ps1_download:
    num_workers: 8
    overwrite: false
  ps1_process:
    # run.sh active line: process_ps1.py 23 2 1 --remove-saturated-stars
    ps1_source: zarr  # default: read shared Zarr from ps1_download
    # Stream mode (no shared ps1_skycells.zarr): set ps1_source: stream and
    # num_ingest_workers below; ps1_download is skipped (shows ps1_dl:n/a).
    #   ps1_source: stream
    #   num_ingest_workers: 16
    remove_saturated_stars: true
    enable_saturation_correction: false
    psf_sigma: 40.0
    # Set to 1 for smoke tests only (see config_smoke.yaml)
    projections_limit: null
  downsample:
    ignore_mask_bits: [12]
    oversampling_factor: 1
    # output under data_root/shifted_downsampled by default
    output_base: /astro/armin/koji/syndiff/data/shifted_downsampled

resources:
  network:
    max_concurrent: 1
  cpu_light:
    max_concurrent: 2
  mapping:
    max_concurrent: 6
  ps1_process:
    max_concurrent: 4

scheduler:
  heartbeat_interval_s: 30.0

notifications:
  enabled: true
  events:
    run_started: true
    run_completed: true
    run_failed: true
    run_canceled: true
    run_retried: true
    run_stalled: true
    run_resumed: true
    stage_failed: true
    stage_completed: true
    stage_canceled: true
    stage_died: true
    daemon_unhealthy: true
  bot:
    enabled: true

# Per-SCC overrides (optional). Example: smoke-limit ps1_process on one SCC.
overrides:
  "23/2/1":
    stages:
      ps1_process:
        projections_limit: 1
