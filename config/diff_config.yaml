# Site diff policy. Paths resolve from deployment.yaml + per-target layout.
# Targets are passed on the CLI via --targets (never embedded here).
deployment_file: deployment.yaml

defaults:
  n_jobs: 8
  pipeline_plots: false
  master_fits_mirror: true
  crop_mode: target_box
  crop_box_size: 1024

# Global forced-photometry extras — applied to every target.
# dx/dy are crop-local pixel offsets from the primary target's per-frame WCS position.
additional_forced_targets:
  - name: offset_top
    dx: 0
    dy: -7
  - name: offset_bottom
    dx: 0
    dy: 7
  - name: offset_right
    dx: 7
    dy: 0
  - name: offset_left
    dx: -7
    dy: 0

pipeline:
  # Template wcs_grouping + downsample must run first; diff loads handoff from
  # cluster_template_job.json, syndiff_ffi_frames.csv, and events/{target}/ws/templates
  - kind: shared_mask
  - kind: hotpants
    science: ffi
    # Gaussian kernel widths (px); middle value sets rkernel/rss via int(2.5 * sigma[1])
    hp_sigma_gauss: [0.752, 1.88, 3.76]
    hp_ko: 2
    hp_bgo: 3
    hp_nstampx: 10
    hp_nstampy: 10
    hp_nss: 100
    hp_ngauss: 3
    hp_deg_fixe: [6, 4, 2]
    hp_kf_spread_mask1: 0.0
    hp_ks: 3.0
    hp_kfm: 0.75
    hp_fitthresh: 5.0
    hp_stat_sig: 3.0
    hp_force_convolve: "t"
    hp_normalize: "t"
    output:
      diffs: hp_d
      convolved: hp_c
      bkg: hp_b
    write_convolved: false
    write_bkg: true
    write_stamps: false
  # - external_workspaces: [hp_d]
  - kind: forced_photometry
    inputs:
      diffs: hp_d
    output: lc_prf_on_diffs
    methods:
      - name: prf
        type: psf
        psf_type: prf
      - name: ap3
        type: aperture
        tar_ap: 3
        sky_in: 5
        sky_out: 9
  # - kind: background
  #   inputs:
  #     diffs: hp_d
  #     bkg: hp_b
  #   output: bkg_final
  #   recombine_inputs: true
  #   steps:
  #     spatial: { enabled: true, box_size: 16, exclude_straps: true }
  #     temporal: { enabled: true, method: savgol, tile_size: 256 }
  #     strap: { enabled: true, qe_floor: 1.001, fix_anomalies: true }
  # - kind: subtract
  #   inputs:
  #     expression: "hp_d - bkg_final"
  #   output: diffs_minus_bkg
  # - kind: forced_photometry
  #   inputs:
  #     diffs: diffs_minus_bkg
  #   output: lc_prf_after_bkg
  #   methods:
  #     - name: prf
  #       type: psf
  #       psf_type: prf
  # - kind: subtract
  #   inputs:
  #     expression: "ffi - bkg_rough - hp_b"
  #   output: ffi_wo_bkg
  # - kind: hotpants
  #   science: ffi_wo_bkg
  #   output:
  #     diffs: hp2_d
  #     convolved: hp2_c
  #     bkg: hp2_b
  # - kind: forced_photometry
  #   inputs:
  #     diffs: hp2_d
  #   psf_type: prf
