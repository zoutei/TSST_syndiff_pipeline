# Per-FFI Hotpants + photometry in a new workspace tree with inherited inputs.
# Prerequisite: diff_config_single_kernel.yaml completed under ws_single_hp_kernel/.
# Use: syndiff diff submit/run with --config config/diff_config_multi_kernel_resume.yaml
deployment_file: deployment.yaml

defaults:
  n_jobs: 8
  pipeline_plots: false
  master_fits_mirror: true
  crop_mode: target_box
  crop_box_size: 1024
  workspace_run_id: multi_hp_kernel

additional_forced_targets:
  - name: offset_top
    dx: 0
    dy: -7
  - name: offset_bottom
    dx: 0
    dy: 7
  - name: offset_right
    dx: 7
    dy: 0
  - name: offset_left
    dx: -7
    dy: 0

pipeline:
  - workspace_inherit:
      from: single_hp_kernel
      labels: [kd_b]
      root_artifacts:
        - shared_mask.fits
        - hotpants_substamp_stars.csv
  - kind: hotpants
    inputs:
      bkg: kd_b
    hp_sigma_gauss: [0.752, 1.88, 3.76]
    hp_ko: 2
    hp_bgo: 0
    hp_nstampx: 10
    hp_nstampy: 10
    hp_nss: 100
    hp_ngauss: 3
    hp_deg_fixe: [6, 4, 2]
    hp_kf_spread_mask1: 0.0
    hp_ks: 3.0
    hp_kfm: 0.75
    hp_fitthresh: 5.0
    hp_stat_sig: 3.0
    hp_force_convolve: "t"
    hp_normalize: "t"
    write_convolved: false
    write_bkg: true
    write_stamps: false
    write_kernel_params: true
    output:
      diffs: mk_d
      convolved: mk_c
      bkg: mk_b
  - kind: forced_photometry
    inputs:
      diffs: mk_d
    psf_type: prf
    output: lc_prf_on_mk_diffs

condor:
  request_cpus: 8
  request_memory: 100000
  requirements: "Memory >= 100000 && LoadAvg < 10"
  rank: "-LoadAvg"
