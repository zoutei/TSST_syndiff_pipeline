# Single-kernel diff policy: Gaia shared mask → min-background HP2 kernel →
# convolved templates → per-FFI algebraic diff + photutils (no Hotpants).
# Use: syndiff diff submit/run with --config config/diff_config_single_kernel.yaml
deployment_file: deployment.yaml

defaults:
  n_jobs: 8
  pipeline_plots: false
  master_fits_mirror: true
  crop_mode: target_box
  crop_box_size: 1024
  workspace_run_id: single_hp_kernel   # debug → events/{target}/ws_dbg_test/
  # workspace_run_id: null

additional_forced_targets:
  - name: offset_top
    dx: 0
    dy: -7
  - name: offset_bottom
    dx: 0
    dy: 7
  - name: offset_right
    dx: 7
    dy: 0
  - name: offset_left
    dx: -7
    dy: 0

pipeline:
  - kind: shared_mask
  - kind: kernel_fit
    weighting_factor: 0.5
    phot_box_size: 4
    write_debug_fits: true
    output: kernel_fit
    hp_sigma_gauss: [0.752, 1.88, 3.76]
    hp_ko: 2
    hp_bgo: 3
    hp_nstampx: 10
    hp_nstampy: 10
    hp_nss: 100
    hp_ngauss: 3
    hp_deg_fixe: [6, 4, 2]
    hp_kf_spread_mask1: 0.0
    hp_ks: 3.0
    hp_kfm: 0.75
    hp_fitthresh: 5.0
    hp_stat_sig: 3.0
    hp_force_convolve: "t"
    hp_normalize: "t"
    write_kernel_params: true
  - kind: convolved_templates
    inputs:
      kernel_fit: kernel_fit
    output: tmpl_conv
  - kind: kernel_subtract
    inputs:
      convolved: tmpl_conv
    phot_box_size: 4
    output:
      diffs: ks_d
      phot_bkg: ks_b
  - kind: background
    inputs:
      bkg_in: ks_b
    output: ks_b_s
    recombine_inputs: false
    steps:
      spatial:
        enabled: false
      temporal:
        enabled: true
        method: savgol
        tile_size: 256
      strap:
        enabled: false
  - kind: subtract
    inputs:
      expression: "ks_d + ks_b - ks_b_s"
    output: ks_d_s
  - kind: forced_photometry
    inputs:
      diffs: ks_d_s
    output: lc_prf_on_diffs
    methods:
      - name: prf
        type: psf
        psf_type: prf
      - name: ap3
        type: aperture
        tar_ap: 3
        sky_in: 5
        sky_out: 9

condor:
  request_cpus: 8
  request_memory: 100000
  requirements: "Memory >= 100000 && LoadAvg < 10"
  rank: "-LoadAvg"
